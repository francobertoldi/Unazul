services:
  postgres:
    image: postgres:16
    container_name: unazul-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: unazul_admin
      POSTGRES_PASSWORD: unazul_dev_2026
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unazul_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
